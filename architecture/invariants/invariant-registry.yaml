version: 1.0.0

invariants:
  - id: INV-01
    name: no_policy_pack_no_execution
    statement: No governed execution may proceed without a resolved policy pack reference.
    severity: critical
    layer: execution
    enforcement_points:
      - execution_gate_service
    failure_response:
      - reject
      - no_release_authorization
      - blocked_action_record
    linked_reason_codes:
      - NO_POLICY_PACK
    enforced_by:
      - test/execution-gate-service.test.ts
      - test/adversarial-integrity.test.ts

  - id: INV-02
