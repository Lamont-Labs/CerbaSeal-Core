name: CerbaSeal Repo Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Full repo audit (15 checks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Full test suite (391 tests)
        run: pnpm test

      - name: Import boundary check
        run: pnpm check:imports

      - name: Invariant coverage check
        run: pnpm check:invariants

      - name: Full repo audit (15/15 checks)
        run: pnpm audit:repo

      - name: Export proof snapshot
        run: pnpm export:proof
        env:
          CERBASEAL_SIGNING_KEY: ${{ secrets.CERBASEAL_SIGNING_KEY }}

      - name: Verify proof snapshot
        run: pnpm verify:proof
        env:
          CERBASEAL_SIGNING_KEY: ${{ secrets.CERBASEAL_SIGNING_KEY }}

      - name: Upload proof snapshot artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proof-snapshot-${{ github.sha }}
          path: docs/reports/proof-snapshot.json
          retention-days: 90
